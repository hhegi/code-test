plugins {
    id 'java'
    id 'application'
}

group = 'com.codetest'
version = '1.0.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    // Gradle Test Executor가 JUnit Platform 런처를 로드할 수 있게 해줍니다.
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.10.2'
}

test {
    useJUnitPlatform()
}

application {
    mainClass = 'com.codetest.Main'
}
